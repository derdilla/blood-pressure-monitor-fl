name: blood_pressure_app
description: Privacy focused, diary like app for storing blood pressure values.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
repository: https://github.com/derdilla/blood-pressure-monitor-fl
issue_tracker: https://github.com/derdilla/blood-pressure-monitor-fl/issues

version: 1.8.12+54

environment:
  sdk: '>=3.0.2 <4.0.0'
  flutter: '3.41.2'

dependencies:
  collection: ^1.19.1
  csv: ^8.0.0
  intl: ^0.20.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  function_tree: ^0.9.1
  provider: ^6.1.5+1
  path: ^1.9.1
  pdf: ^3.12.0
  package_info_plus: ^9.0.0
  week_of_year: 2.2.0
  sqflite: ^2.4.2
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  health_data_store:
    path: ../health_data_store/
  flutter_bloc: ^9.1.1
  bluetooth_low_energy: ^6.2.1
  flutter_blue_plus: 1.36.8 # Can't update further: Starting from 2.0 the license gets weird
  archive: ^4.0.9
  file_picker: ^10.3.10
  app_settings: ^7.0.0
  logging: ^1.3.0
  persistent_user_dir_access_android: ^0.0.1
  share_plus: ^12.0.1

  # desktop only
  sqflite_common_ffi: ^2.4.0+2
  inline_tab_view: ^1.0.1
  xml: ^6.6.1
  health: ^13.3.1
  receive_intent: ^0.2.7

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  file: ^7.0.1
  flutter_lints: ^6.0.0
  mockito: ^5.6.3
  translations_cleaner: ^0.1.1
  build_runner: ^2.13.0
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  generate: true

hooks:
  user_defines:
    sqlite3:
      source: sqlite3